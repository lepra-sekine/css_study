<html>
    <head>
        <link href="../css/example_1.css" type="text/css" rel="stylesheet" />
        <title>CSSのサイズ指定</title>
    </head>
    <body>
        <!-- ただdiv要素を表示するだけ。 -->
        <div class="parent">
            親ブロック。
        </div>

        <!-- div内部の子divをvw, vhで指定する場合 -->
        <div class="parent">
            <div class="child">
                子ブロック。
            </div>
        </div>

        <div class="static-parent">
            <div class="child">
                子ブロック。
            </div>
        </div>
    </body>
</html>
